name: iOS Build & Screenshot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ios-build-test:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (Simulator)
        run: flutter build ios --simulator --no-codesign

      - name: Boot iOS Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " 2>/dev/null || echo "")
          
          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl create "Test iPhone" "iPhone 16" 2>/dev/null || xcrun simctl create "Test iPhone" "iPhone 15")
          fi
          
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 10

      - name: Install app on Simulator
        run: |
          APP_PATH=$(find build/ios/iphonesimulator -name "*.app" -type d | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"

      - name: Pre-configure Slack webhook
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # Pre-seed SharedPreferences with the Slack webhook config
          WEBHOOK_JSON="{\"id\":\"ci_test_1\",\"platform\":\"slack\",\"name\":\"Team Slack\",\"url\":\"${SLACK_WEBHOOK_URL}\",\"filter\":\"\",\"telegramChatId\":null}"
          
          xcrun simctl spawn "$DEVICE_ID" defaults write com.example.smsforward "flutter.webhooks" -array "$WEBHOOK_JSON"
          echo "✅ Pre-configured Slack webhook in app preferences"

      - name: Test Slack webhook directly
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          echo "🧪 Testing Slack webhook with curl..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"text":"📩 *SMS Received (iOS CI Test)*\n*From:* GitHub Actions\n*Message:* ✅ SMS Forwarder iOS build successful! App is working on iPhone simulator."}' \
            "${SLACK_WEBHOOK_URL}")
          
          echo "Slack webhook response: HTTP $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Webhook is working! Check your Slack channel."
          else
            echo "❌ Webhook returned HTTP $RESPONSE"
          fi

      - name: Launch app & capture initial screenshot
        run: |
          BUNDLE_ID="com.example.smsforward"
          mkdir -p screenshots
          
          echo "🚀 Launching app..."
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID" || true
          sleep 8
          
          echo "📸 Capturing app with Slack provider configured..."
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/01_providers_tab.png

      - name: Trigger test SMS via deep link
        run: |
          echo "📨 Triggering test SMS forwarding via deep link..."
          xcrun simctl openurl "$DEVICE_ID" "smsforward://forward?sender=+1234567890&message=Hello%20from%20GitHub%20Actions%20iOS%20CI%21%20This%20is%20a%20test%20SMS%20forwarded%20via%20the%20iOS%20simulator."
          
          sleep 10
          
          echo "📸 Capturing app after forwarding..."
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/02_after_forward.png

      - name: Capture Activity tab
        run: |
          sleep 3
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/03_activity_view.png

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/
          retention-days: 30

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/iphonesimulator/
          retention-days: 7

      - name: Summary
        run: |
          echo "## ✅ iOS Build & Slack Webhook Test" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ iOS app built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ App launched on iPhone simulator" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Slack webhook tested" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Test SMS forwarded via deep link" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Screenshots:" >> $GITHUB_STEP_SUMMARY
          for f in screenshots/*.png; do
            echo "- $(basename $f)" >> $GITHUB_STEP_SUMMARY
          done
