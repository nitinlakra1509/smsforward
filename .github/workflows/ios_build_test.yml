name: iOS Build & Screenshot

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ios-build-test:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (Simulator)
        run: flutter build ios --simulator --no-codesign

      - name: Boot iOS Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['udid'])
                          sys.exit(0)
          " 2>/dev/null || echo "")
          
          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl create "Test iPhone" "iPhone 16" 2>/dev/null || xcrun simctl create "Test iPhone" "iPhone 15")
          fi
          
          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          xcrun simctl boot "$DEVICE_ID" || true
          sleep 15

      - name: Test Slack webhook directly
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            echo "🧪 Testing Slack webhook with curl..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Content-Type: application/json" \
              -d '{"text":"📩 *SMS Received (iOS CI Test)*\n*From:* GitHub Actions\n*Message:* ✅ SMS Forwarder iOS build successful! App is working on iPhone simulator."}' \
              "${SLACK_WEBHOOK_URL}")
            echo "Slack webhook response: HTTP $RESPONSE"
          else
            echo "⚠️ SLACK_WEBHOOK_URL secret not set, skipping"
          fi

      # ─── Screen Recording + Integration Test ───
      - name: Start screen recording
        run: |
          mkdir -p recordings screenshots
          xcrun simctl io "$DEVICE_ID" recordVideo --codec=h264 recordings/full_walkthrough.mp4 &
          echo "RECORD_PID=$!" >> $GITHUB_ENV
          echo "🎬 Screen recording started (PID: $!)"
          sleep 2

      - name: Run integration test (captures all pages)
        run: |
          # The integration test navigates all tabs, opens sheets, fills forms
          # and captures screenshots programmatically via Flutter's test framework
          flutter test integration_test/app_walkthrough_test.dart \
            -d "$DEVICE_ID" \
            --verbose 2>&1 | tee test_output.log || true
          
          echo ""
          echo "=== Test Result ==="
          tail -5 test_output.log

      - name: Collect integration test screenshots
        run: |
          # Flutter integration test screenshots are saved in the build directory
          find /tmp -name "*.png" -newer recordings/full_walkthrough.mp4 -exec cp {} screenshots/ \; 2>/dev/null || true
          find . -name "*.png" -path "*/build/*" -newer recordings/full_walkthrough.mp4 -exec cp {} screenshots/ \; 2>/dev/null || true
          
          # Also check for screenshots from the IntegrationTestWidgetsFlutterBinding
          find /Users/runner -maxdepth 5 -name "*_providers*" -o -name "*_activity*" -o -name "*_setup*" -o -name "*_slack*" -o -name "*_discord*" 2>/dev/null | head -20
          
          echo "Screenshots found so far:"
          ls -la screenshots/ 2>/dev/null || echo "none"

      - name: Launch app and capture simulator screenshots
        run: |
          BUNDLE_ID="com.example.smsforward"
          
          # Install the app
          APP_PATH=$(find build/ios/iphonesimulator -name "*.app" -type d | head -1)
          xcrun simctl install "$DEVICE_ID" "$APP_PATH"
          
          # Launch the app
          echo "🚀 Launching app..."
          xcrun simctl launch "$DEVICE_ID" "$BUNDLE_ID" 2>&1 || true
          sleep 8
          
          # Take screenshot of whatever is on screen
          echo "📸 Capturing current screen..."
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/sim_01_app_launched.png
          
          # Wait and capture again (app may need time to render)
          sleep 5
          xcrun simctl io "$DEVICE_ID" screenshot screenshots/sim_02_app_rendered.png

      - name: Stop screen recording
        if: always()
        run: |
          if [ -n "$RECORD_PID" ]; then
            echo "🎬 Stopping screen recording..."
            kill -INT "$RECORD_PID" 2>/dev/null || true
            # Wait for the recording to finalize
            wait "$RECORD_PID" 2>/dev/null || true
            sleep 3
            
            if [ -f recordings/full_walkthrough.mp4 ]; then
              SIZE=$(stat -f%z recordings/full_walkthrough.mp4 2>/dev/null || echo "unknown")
              echo "✅ Recording saved: ${SIZE} bytes"
            else
              echo "⚠️ Recording file not found"
            fi
          fi

      - name: List all captured files
        if: always()
        run: |
          echo "📸 Screenshots:"
          ls -lah screenshots/ 2>/dev/null || echo "  No screenshots"
          echo ""
          echo "🎬 Recordings:"
          ls -lah recordings/ 2>/dev/null || echo "  No recordings"

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screenshots
          path: screenshots/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload screen recording
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-screen-recording
          path: recordings/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload iOS build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/iphonesimulator/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## 📱 iOS Build & Walkthrough" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloadable Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- 🎬 **ios-screen-recording** — Full MP4 video of the app walkthrough" >> $GITHUB_STEP_SUMMARY
          echo "- 📸 **ios-screenshots** — Screenshots of every page" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 **ios-simulator-build** — The iOS .app bundle" >> $GITHUB_STEP_SUMMARY
